<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page not found — SalesFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/brand.css" />
<style>
.wrap { min-height: calc(100vh - 72px); display: flex; align-items: center; justify-content: center; padding: 80px 32px; text-align: center; position: relative; }
.wrap::before { content:''; position:absolute; inset:0; background-image: radial-gradient(rgba(20,20,19,0.05) 1.5px, transparent 1.5px); background-size: 24px 24px; opacity: 0.7; pointer-events: none; }
.big { font-family: var(--display-font); font-size: clamp(140px, 22vw, 320px); letter-spacing: -0.05em; line-height: 0.9; font-weight: 600; color: var(--ink); position: relative; }
.big .acc {  color: var(--signal); font-weight: 500; }
.msg { margin-top: 32px; max-width: 440px; margin-left: auto; margin-right: auto; position: relative; }
.msg .tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--signal); text-transform: uppercase; margin-bottom: 14px; }
.msg h1 { font-family: var(--display-font); font-size: 34px; letter-spacing: -0.025em; line-height: 1.15; font-weight: 600; margin: 0 0 14px; }
.msg h1 .acc {  color: var(--signal); font-weight: 500; }
.msg p { color: var(--ink2); font-size: 15px; line-height: 1.6; margin: 0 0 24px; }
.suggest { margin-top: 40px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 600px; margin-left: auto; margin-right: auto; position: relative; }
@media (max-width: 600px) { .suggest { grid-template-columns: 1fr; } }
.suggest a { border: 1px solid var(--line); border-radius: 10px; padding: 14px; background: var(--bg); font-size: 13.5px; color: var(--ink); transition: all 0.12s; }
.suggest a:hover { background: var(--bg2); border-color: var(--signal); }
.suggest a .n { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
</style></head><body>
<div id="shell-top"></div>
<div class="wrap"><div>
  <div class="big">4<span class="acc">0</span>4</div>
  <div class="msg">
    <div class="tag">/ Page not found</div>
    <h1>We looked. It's <span class="t-signal t-italic">not there.</span></h1>
    <p>The page you're after might have moved, or never existed. No harm done. Try one of the routes below, or go home.</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"><a class="btn btn-primary btn-lg" href="home.html">Go home →</a><a class="btn btn-ghost btn-lg" href="help.html">Help centre</a></div>
  </div>
  <div class="suggest">
    <a href="product.html"><span class="n">01</span>How it works</a>
    <a href="contractors.html"><span class="n">02</span>For contractors</a>
    <a href="pricing.html"><span class="n">03</span>Earnings</a>
    <a href="apply.html"><span class="n">04</span>Apply to contract</a>
    <a href="login.html"><span class="n">05</span>Log in</a>
    <a href="contact.html"><span class="n">06</span>Contact us</a>
  </div>
</div></div>
<div id="shell-footer"></div>
<script src="shared/shell.js"></script>
<script>renderShell({currentPath: ''});</script>
</body></html>
